name: Scrape Prospects

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4
      - name: Run scraper
        run: |
          python -c "
import asyncio, aiohttp, re, time, sqlite3, os
from urllib.parse import urljoin

SOURCES = ['https://www.leboncoin.fr/offres/', 'https://www.freelance-info.fr/annonces']
NB_AGENTS = 500
NB_BOOSTERS = 300

async def fetch(session, url):
    try:
        async with session.get(url, timeout=10) as resp:
            return await resp.text() if resp.status == 200 else ''
    except: return ''

async def worker(queue, booster):
    async with aiohttp.ClientSession() as session:
        while True:
            for src in SOURCES:
                html = await fetch(session, src)
                if html:
                    emails = set(re.findall(r'[\w\.-]+@[\w\.-]+\.\w+', html))
                    for e in emails:
                        queue.put_nowait(e)
                await asyncio.sleep(0.5 if booster else 2)

async def storer(queue):
    conn = sqlite3.connect('prospects.db')
    conn.execute('CREATE TABLE IF NOT EXISTS leads (email TEXT UNIQUE, date INTEGER)')
    while True:
        email = await queue.get()
        conn.execute('INSERT OR IGNORE INTO leads VALUES (?,?)', (email, int(time.time())))
        conn.commit()

async def main():
    queue = asyncio.Queue()
    asyncio.create_task(storer(queue))
    for _ in range(NB_AGENTS): asyncio.create_task(worker(queue, False))
    for _ in range(NB_BOOSTERS): asyncio.create_task(worker(queue, True))
    await asyncio.Event().wait()

asyncio.run(main())
"
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: prospects
          path: prospects.db
